name: Flutter CI

on:
  push:
    branches:
      - claude/restructure-modules-filament-VrcWJ
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Flutter Analyze & Build (debug APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"

      - name: Install dependencies
        working-directory: Mobile
        run: flutter pub get

      - name: Analyze code
        working-directory: Mobile
        run: flutter analyze

      - name: Build debug APK
        working-directory: Mobile
        run: flutter build apk --debug
