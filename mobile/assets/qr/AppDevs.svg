<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     x="0px" y="0px" viewBox="0 0 728 728" xml:space="preserve">
  <!-- ZeroPay brand background -->
  <rect width="728" height="728" rx="80" ry="80" fill="#0a143c"/>
  <!-- Outer ring -->
  <circle cx="364" cy="364" r="280" fill="none" stroke="#007aff" stroke-width="20"/>
  <!-- Z letter - top bar -->
  <line x1="220" y1="220" x2="508" y2="220" stroke="#32cd96" stroke-width="36" stroke-linecap="round"/>
  <!-- Z letter - diagonal -->
  <line x1="508" y1="220" x2="220" y2="508" stroke="#32cd96" stroke-width="36" stroke-linecap="round"/>
  <!-- Z letter - bottom bar -->
  <line x1="220" y1="508" x2="508" y2="508" stroke="#32cd96" stroke-width="36" stroke-linecap="round"/>
  <!-- Brand text -->
  <text x="364" y="660" font-family="Arial, sans-serif" font-size="60" font-weight="bold"
        text-anchor="middle" fill="#ffffff">ZeroPay</text>
  <!-- Small accent dot -->
  <circle cx="540" cy="490" r="18" fill="#007aff"/>
</svg>
